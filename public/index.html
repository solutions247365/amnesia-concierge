<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amnesia Concierge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1a1a1a;
      --border: #222;
      --text: #e0e0e0;
      --text-dim: #777;
      --accent: #c8c8c8;
      --danger: #a33;
      --success: #3a7;
      --warning: #b80;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .summary-bar {
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .summary-bar span strong {
      color: var(--text);
    }

    nav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    nav button {
      flex: 1;
      padding: 12px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    nav button:hover { color: var(--text); }
    nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

    main { max-width: 900px; margin: 0 auto; padding: 24px; }

    .section { display: none; }
    .section.active { display: block; }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    input, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      border-radius: 4px;
      width: 100%;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #444;
    }

    textarea { resize: vertical; min-height: 80px; }

    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      font-size: 13px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: var(--surface-hover); }

    .btn-primary { background: #222; border-color: #333; }
    .btn-danger { color: var(--danger); }
    .btn-small { padding: 4px 10px; font-size: 12px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: #333; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .card-body {
      font-size: 14px;
      line-height: 1.5;
      color: #bbb;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-actions {
      display: flex;
      gap: 6px;
    }

    .link-url {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
      font-size: 13px;
    }

    .link-url:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-active { background: #1a2f1a; color: var(--success); }
    .badge-finalized { background: #2a2010; color: var(--warning); }
    .badge-overdue { background: #2a1515; color: var(--danger); }

    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group { flex: 1; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      margin: 20px;
    }

    .modal h2 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .activity-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-action {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .activity-summary { font-size: 14px; }
    .activity-time { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

    .scratchpad-input textarea {
      font-size: 15px;
      line-height: 1.6;
      min-height: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }

    .scratchpad-input textarea:focus {
      border-color: #444;
    }

    .scratchpad-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
    }

    .scratchpad-hint {
      font-size: 12px;
      color: var(--text-dim);
    }

    .scratchpad-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .scratchpad-entry:hover { border-color: #333; }

    .scratchpad-entry-content {
      flex: 1;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.5;
    }

    .scratchpad-entry-time {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      margin-top: 2px;
    }

    .scratchpad-entry-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .scratchpad-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      margin-top: 20px;
    }

    .scratchpad-summary:empty { display: none; }

    .scratchpad-summary h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    .summary-stats {
      display: flex;
      gap: 20px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .summary-stat {
      font-size: 13px;
      color: var(--text-dim);
    }

    .summary-stat strong {
      color: var(--text);
    }

    .summary-previews {
      list-style: none;
      padding: 0;
    }

    .summary-previews li {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: #aaa;
    }

    .summary-previews li:last-child { border-bottom: none; }

    .summary-previews li::before {
      content: '·';
      margin-right: 8px;
      color: var(--text-dim);
    }

    .summary-urls {
      margin-top: 10px;
    }

    .summary-urls a {
      display: block;
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      padding: 2px 0;
      word-break: break-all;
    }

    .summary-urls a:hover { text-decoration: underline; }

    .summary-keywords {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .summary-keyword {
      background: #1a1a1a;
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .device-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 6px;
      display: grid;
      grid-template-columns: 130px 140px 1fr auto;
      gap: 12px;
      align-items: center;
      font-size: 13px;
      transition: border-color 0.15s;
    }

    .device-row:hover { border-color: #333; }
    .device-row.flagged { border-left: 3px solid var(--danger); }

    .device-ip { font-family: monospace; font-size: 13px; }
    .device-mac { font-family: monospace; font-size: 12px; color: var(--text-dim); }
    .device-vendor { font-size: 12px; color: #999; }
    .device-label { font-size: 13px; color: var(--accent); font-weight: 500; }
    .device-seen { font-size: 11px; color: var(--text-dim); }

    .device-info { min-width: 0; }

    .device-actions {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }

    .scan-paste-area {
      margin-bottom: 16px;
    }

    .scan-paste-area textarea {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      min-height: 120px;
      line-height: 1.4;
    }

    .scan-result {
      background: #0d1a0d;
      border: 1px solid #1a2f1a;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--success);
    }

    .scan-history-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .scan-history-item:last-child { border-bottom: none; }

    .network-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }

    .network-toolbar .view-toggle {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .filter-bar input {
      max-width: 250px;
      padding: 6px 10px;
      font-size: 12px;
    }

    .device-edit-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .device-edit-overlay.active { display: flex; }

    @media (max-width: 700px) {
      .device-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      font-size: 14px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
    }

    .checkbox-group label {
      margin: 0;
      text-transform: none;
      font-size: 13px;
      color: var(--text);
    }
  </style>
</head>
<body>

<header>
  <h1>Amnesia Concierge</h1>
  <div class="summary-bar" id="summaryBar"></div>
</header>

<nav>
  <button class="active" data-tab="scratchpad">Scratchpad</button>
  <button data-tab="network">Network</button>
  <button data-tab="notes">Notes</button>
  <button data-tab="links">Links</button>
  <button data-tab="deadlines">Deadlines</button>
  <button data-tab="activity">Activity</button>
</nav>

<main>
  <!-- Scratchpad -->
  <div class="section active" id="scratchpad">
    <div class="scratchpad-input">
      <textarea id="scratchpadText" rows="4" placeholder="Jot something down... press Enter to save, Shift+Enter for new line"></textarea>
    </div>
    <div class="scratchpad-toolbar">
      <span class="scratchpad-hint" id="scratchpadCount">0 entries</span>
      <button class="btn-small btn-danger" onclick="clearScratchpad()">Clear All</button>
    </div>
    <div id="scratchpadList"></div>
    <div class="scratchpad-summary" id="scratchpadSummary"></div>
  </div>

  <!-- Network -->
  <div class="section" id="network">
    <div class="network-toolbar">
      <button class="btn-primary" onclick="toggleScanInput()">+ Import Scan</button>
      <button class="btn-small" onclick="showScanHistory()">Scan History</button>
      <div class="view-toggle">
        <button class="btn-small" onclick="setNetFilter('all')" id="filterAll">All</button>
        <button class="btn-small" onclick="setNetFilter('flagged')" id="filterFlagged">Flagged</button>
        <button class="btn-small" onclick="setNetFilter('new')" id="filterNew">New</button>
      </div>
    </div>
    <div class="scan-paste-area" id="scanPasteArea" style="display:none">
      <textarea id="scanOutput" placeholder="Paste your arp-scan output here...&#10;&#10;Example: sudo arp-scan --interface=wlan0 --localnet"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-primary" onclick="importScan()">Import</button>
        <button onclick="toggleScanInput()">Cancel</button>
      </div>
    </div>
    <div id="scanResult" class="scan-result" style="display:none"></div>
    <div class="filter-bar">
      <input type="text" id="deviceSearch" placeholder="Filter by IP, MAC, vendor, or label..." oninput="renderDevices()">
    </div>
    <div id="deviceCount" style="font-size:12px;color:var(--text-dim);margin-bottom:10px"></div>
    <div id="deviceList"></div>
  </div>

  <!-- Notes -->
  <div class="section" id="notes">
    <div class="toolbar">
      <button class="btn-primary" onclick="openNoteModal()">+ New Note</button>
    </div>
    <div id="notesList"></div>
  </div>

  <!-- Links -->
  <div class="section" id="links">
    <div class="toolbar">
      <input type="text" id="linkInput" placeholder="Paste a URL and press Enter..." onkeydown="if(event.key==='Enter')addLink()">
      <button class="btn-primary" onclick="addLink()">Add</button>
    </div>
    <div id="linksList"></div>
  </div>

  <!-- Deadlines -->
  <div class="section" id="deadlines">
    <div class="toolbar">
      <button class="btn-primary" onclick="openDeadlineModal()">+ New Deadline</button>
    </div>
    <div id="deadlinesList"></div>
  </div>

  <!-- Activity -->
  <div class="section" id="activity">
    <div id="activityList"></div>
  </div>
</main>

<!-- Note Modal -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <h2 id="noteModalTitle">New Note</h2>
    <input type="hidden" id="noteId">
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="noteTitle" placeholder="Note title...">
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="noteContent" rows="6" placeholder="Write your note..."></textarea>
    </div>
    <div class="modal-actions">
      <button onclick="closeNoteModal()">Cancel</button>
      <button class="btn-primary" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<!-- Deadline Modal -->
<div class="modal-overlay" id="deadlineModal">
  <div class="modal">
    <h2>New Deadline</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="deadlineTitle" placeholder="What's due?">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="deadlineDesc" rows="3" placeholder="Details..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="deadlineDate">
      </div>
      <div class="form-group">
        <label>Due Time</label>
        <input type="time" id="deadlineTime" value="23:59">
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="deadlineAutoFinalize" checked>
        <label for="deadlineAutoFinalize">Auto-finalize when overdue</label>
      </div>
    </div>
    <div class="modal-actions">
      <button onclick="closeDeadlineModal()">Cancel</button>
      <button class="btn-primary" onclick="saveDeadline()">Save</button>
    </div>
  </div>
</div>

<!-- Device Edit Modal -->
<div class="device-edit-overlay" id="deviceEditModal">
  <div class="modal">
    <h2>Edit Device</h2>
    <input type="hidden" id="editDeviceId">
    <div style="font-family:monospace;font-size:13px;margin-bottom:12px;color:var(--text-dim)">
      <span id="editDeviceIp"></span> &mdash; <span id="editDeviceMac"></span>
    </div>
    <div class="form-group">
      <label>Label</label>
      <input type="text" id="editDeviceLabel" placeholder="e.g. Living Room TV, Dad's Phone...">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="editDeviceNotes" rows="4" placeholder="Any observations, nmap results, etc..."></textarea>
    </div>
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="editDeviceFlagged">
        <label for="editDeviceFlagged">Flag as suspicious</label>
      </div>
    </div>
    <div class="modal-actions">
      <button onclick="closeDeviceEdit()">Cancel</button>
      <button class="btn-primary" onclick="saveDeviceEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Scan History Modal -->
<div class="device-edit-overlay" id="scanHistoryModal">
  <div class="modal" style="max-width:600px">
    <h2>Scan History</h2>
    <div id="scanHistoryList"></div>
    <div class="modal-actions">
      <button onclick="closeScanHistory()">Close</button>
    </div>
  </div>
</div>

<script>
  const API = '/api';

  // --- Tabs ---
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
      loadTab(btn.dataset.tab);
    });
  });

  // --- Scratchpad ---
  document.getElementById('scratchpadText').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      addScratchpadEntry();
    }
  });

  async function addScratchpadEntry() {
    const textarea = document.getElementById('scratchpadText');
    const content = textarea.value.trim();
    if (!content) return;
    await fetch(`${API}/scratchpad`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content}) });
    textarea.value = '';
    loadScratchpad();
    loadSummary();
  }

  async function loadScratchpad() {
    const res = await fetch(`${API}/scratchpad`);
    const entries = await res.json();
    const el = document.getElementById('scratchpadList');
    document.getElementById('scratchpadCount').textContent = `${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}`;
    if (!entries.length) {
      el.innerHTML = '<div class="empty-state">Nothing here yet. Start typing above.</div>';
      document.getElementById('scratchpadSummary').innerHTML = '';
      return;
    }
    el.innerHTML = entries.map(e => `
      <div class="scratchpad-entry">
        <div class="scratchpad-entry-content">${esc(e.content)}</div>
        <div class="scratchpad-entry-actions">
          <div class="scratchpad-entry-time">${timeAgo(e.created_at)}</div>
          <button class="btn-small" onclick="navigator.clipboard.writeText(${JSON.stringify(e.content)})">Copy</button>
          <button class="btn-small btn-danger" onclick="deleteScratchpadEntry(${e.id})">×</button>
        </div>
      </div>
    `).join('');
    loadScratchpadSummary();
  }

  async function loadScratchpadSummary() {
    const res = await fetch(`${API}/scratchpad/summary`);
    const data = await res.json();
    const el = document.getElementById('scratchpadSummary');
    if (!data.summary) { el.innerHTML = ''; return; }
    const s = data.summary;

    const elapsed = Math.round((new Date(s.timeRange.last + 'Z') - new Date(s.timeRange.first + 'Z')) / 60000);
    const timeStr = elapsed < 1 ? 'just now' : elapsed < 60 ? `${elapsed} min` : `${Math.round(elapsed / 60)}h ${elapsed % 60}m`;

    let html = `<h3>Session Summary</h3>`;
    html += `<div class="summary-stats">`;
    html += `<span class="summary-stat"><strong>${s.totalEntries}</strong> entries</span>`;
    html += `<span class="summary-stat"><strong>${s.totalWords}</strong> words</span>`;
    html += `<span class="summary-stat">span: <strong>${timeStr}</strong></span>`;
    html += `</div>`;

    html += `<ul class="summary-previews">`;
    for (const p of s.entryPreviews) {
      html += `<li>${esc(p)}</li>`;
    }
    html += `</ul>`;

    if (s.urls.length) {
      html += `<div class="summary-urls">`;
      for (const u of s.urls) {
        html += `<a href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a>`;
      }
      html += `</div>`;
    }

    if (s.topKeywords.length) {
      html += `<div class="summary-keywords">`;
      for (const k of s.topKeywords) {
        html += `<span class="summary-keyword">${esc(k)}</span>`;
      }
      html += `</div>`;
    }

    el.innerHTML = html;
  }

  async function deleteScratchpadEntry(id) {
    await fetch(`${API}/scratchpad/${id}`, { method: 'DELETE' });
    loadScratchpad();
    loadSummary();
  }

  async function clearScratchpad() {
    if (!confirm('Clear all scratchpad entries?')) return;
    await fetch(`${API}/scratchpad`, { method: 'DELETE' });
    loadScratchpad();
    loadSummary();
  }

  function loadTab(tab) {
    if (tab === 'scratchpad') loadScratchpad();
    else if (tab === 'network') loadNetwork();
    else if (tab === 'notes') loadNotes();
    else if (tab === 'links') loadLinks();
    else if (tab === 'deadlines') loadDeadlines();
    else if (tab === 'activity') loadActivity();
  }

  // --- Network Recon ---
  let allDevices = [];
  let netFilter = 'all';

  function setNetFilter(f) {
    netFilter = f;
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1));
    if (btn) btn.classList.add('active');
    renderDevices();
  }

  async function loadNetwork() {
    const res = await fetch(`${API}/network/devices`);
    allDevices = await res.json();
    renderDevices();
  }

  function renderDevices() {
    const el = document.getElementById('deviceList');
    const searchVal = (document.getElementById('deviceSearch').value || '').toLowerCase();
    let filtered = allDevices;

    if (netFilter === 'flagged') filtered = filtered.filter(d => d.flagged);
    if (netFilter === 'new') filtered = filtered.filter(d => d.times_seen === 1);

    if (searchVal) {
      filtered = filtered.filter(d =>
        d.ip.includes(searchVal) ||
        d.mac.includes(searchVal) ||
        d.vendor.toLowerCase().includes(searchVal) ||
        d.label.toLowerCase().includes(searchVal) ||
        d.notes.toLowerCase().includes(searchVal)
      );
    }

    document.getElementById('deviceCount').textContent = `${filtered.length} of ${allDevices.length} devices`;

    if (!filtered.length) {
      el.innerHTML = allDevices.length
        ? '<div class="empty-state">No devices match your filter.</div>'
        : '<div class="empty-state">No devices discovered yet. Import an arp-scan to get started.</div>';
      return;
    }

    el.innerHTML = filtered.map(d => `
      <div class="device-row${d.flagged ? ' flagged' : ''}">
        <div>
          <div class="device-ip">${esc(d.ip)}</div>
          <div class="device-mac">${esc(d.mac)}</div>
        </div>
        <div class="device-info">
          ${d.label ? `<div class="device-label">${esc(d.label)}</div>` : ''}
          <div class="device-vendor">${esc(d.vendor || 'Unknown vendor')}</div>
        </div>
        <div>
          <div class="device-seen">Seen ${d.times_seen}x</div>
          <div class="device-seen">Last: ${timeAgo(d.last_seen_at)}</div>
          ${d.notes ? `<div class="device-seen" style="color:#888;margin-top:2px">${esc(d.notes.substring(0,60))}${d.notes.length>60?'...':''}</div>` : ''}
        </div>
        <div class="device-actions">
          <button class="btn-small" onclick="openDeviceEdit(${d.id})">Edit</button>
          <button class="btn-small btn-danger" onclick="deleteDevice(${d.id})">×</button>
        </div>
      </div>
    `).join('');
  }

  function toggleScanInput() {
    const el = document.getElementById('scanPasteArea');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
    document.getElementById('scanResult').style.display = 'none';
  }

  async function importScan() {
    const raw = document.getElementById('scanOutput').value;
    if (!raw.trim()) return;
    const res = await fetch(`${API}/network/scan`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ raw_output: raw })
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || 'Import failed');
      return;
    }
    document.getElementById('scanOutput').value = '';
    document.getElementById('scanPasteArea').style.display = 'none';
    const resultEl = document.getElementById('scanResult');
    resultEl.textContent = `Imported ${data.devices_found} devices (${data.new_devices} new, ${data.updated_devices} seen before)`;
    resultEl.style.display = 'block';
    setTimeout(() => resultEl.style.display = 'none', 5000);
    loadNetwork();
    loadSummary();
  }

  function openDeviceEdit(id) {
    const dev = allDevices.find(d => d.id === id);
    if (!dev) return;
    document.getElementById('editDeviceId').value = id;
    document.getElementById('editDeviceIp').textContent = dev.ip;
    document.getElementById('editDeviceMac').textContent = dev.mac;
    document.getElementById('editDeviceLabel').value = dev.label;
    document.getElementById('editDeviceNotes').value = dev.notes;
    document.getElementById('editDeviceFlagged').checked = !!dev.flagged;
    document.getElementById('deviceEditModal').classList.add('active');
    document.getElementById('editDeviceLabel').focus();
  }

  function closeDeviceEdit() {
    document.getElementById('deviceEditModal').classList.remove('active');
  }

  async function saveDeviceEdit() {
    const id = document.getElementById('editDeviceId').value;
    const label = document.getElementById('editDeviceLabel').value;
    const notes = document.getElementById('editDeviceNotes').value;
    const flagged = document.getElementById('editDeviceFlagged').checked;
    await fetch(`${API}/network/devices/${id}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ label, notes, flagged })
    });
    closeDeviceEdit();
    loadNetwork();
  }

  async function deleteDevice(id) {
    if (!confirm('Remove this device from inventory?')) return;
    await fetch(`${API}/network/devices/${id}`, { method: 'DELETE' });
    loadNetwork();
    loadSummary();
  }

  async function showScanHistory() {
    const res = await fetch(`${API}/network/scans`);
    const scans = await res.json();
    const el = document.getElementById('scanHistoryList');
    if (!scans.length) {
      el.innerHTML = '<div class="empty-state">No scans imported yet.</div>';
    } else {
      el.innerHTML = scans.map(s => `
        <div class="scan-history-item">
          <div>
            <div style="font-size:13px">${esc(s.interface || 'unknown')} &mdash; ${s.responded} devices</div>
            <div style="font-size:12px;color:var(--text-dim)">${s.host_count} hosts scanned in ${s.duration_sec}s &middot; ${timeAgo(s.created_at)}</div>
          </div>
          <button class="btn-small btn-danger" onclick="deleteScan(${s.id})">×</button>
        </div>
      `).join('');
    }
    document.getElementById('scanHistoryModal').classList.add('active');
  }

  function closeScanHistory() {
    document.getElementById('scanHistoryModal').classList.remove('active');
  }

  async function deleteScan(id) {
    if (!confirm('Delete this scan record?')) return;
    await fetch(`${API}/network/scans/${id}`, { method: 'DELETE' });
    showScanHistory();
  }

  // --- Summary ---
  async function loadSummary() {
    const res = await fetch(`${API}/summary`);
    const data = await res.json();
    document.getElementById('summaryBar').innerHTML = `
      <span><strong>${data.devices}</strong> devices</span>
      ${data.flagged ? `<span style="color:var(--danger)"><strong>${data.flagged}</strong> flagged</span>` : ''}
      <span><strong>${data.notes}</strong> notes</span>
      <span><strong>${data.links}</strong> links</span>
      <span><strong>${data.deadlines.active}</strong> active</span>
      <span><strong>${data.deadlines.overdue}</strong> overdue</span>
    `;
  }

  // --- Notes ---
  async function loadNotes() {
    const res = await fetch(`${API}/notes`);
    const notes = await res.json();
    const el = document.getElementById('notesList');
    if (!notes.length) { el.innerHTML = '<div class="empty-state">No notes yet. Create one to get started.</div>'; return; }
    el.innerHTML = notes.map(n => `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${esc(n.title || 'Untitled')}</div>
            <div class="card-meta">${timeAgo(n.updated_at)}</div>
          </div>
          <div class="card-actions">
            <button class="btn-small" onclick="editNote(${n.id})">Edit</button>
            <button class="btn-small btn-danger" onclick="deleteNote(${n.id})">Delete</button>
          </div>
        </div>
        <div class="card-body">${esc(n.content)}</div>
      </div>
    `).join('');
  }

  function openNoteModal(id) {
    document.getElementById('noteId').value = id || '';
    document.getElementById('noteTitle').value = '';
    document.getElementById('noteContent').value = '';
    document.getElementById('noteModalTitle').textContent = id ? 'Edit Note' : 'New Note';
    document.getElementById('noteModal').classList.add('active');
    document.getElementById('noteTitle').focus();
  }

  function closeNoteModal() {
    document.getElementById('noteModal').classList.remove('active');
  }

  async function editNote(id) {
    const res = await fetch(`${API}/notes`);
    const notes = await res.json();
    const note = notes.find(n => n.id === id);
    if (!note) return;
    openNoteModal(id);
    document.getElementById('noteTitle').value = note.title;
    document.getElementById('noteContent').value = note.content;
  }

  async function saveNote() {
    const id = document.getElementById('noteId').value;
    const title = document.getElementById('noteTitle').value;
    const content = document.getElementById('noteContent').value;
    if (id) {
      await fetch(`${API}/notes/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title, content}) });
    } else {
      await fetch(`${API}/notes`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title, content}) });
    }
    closeNoteModal();
    loadNotes();
    loadSummary();
  }

  async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;
    await fetch(`${API}/notes/${id}`, { method: 'DELETE' });
    loadNotes();
    loadSummary();
  }

  // --- Links ---
  async function loadLinks() {
    const res = await fetch(`${API}/links`);
    const links = await res.json();
    const el = document.getElementById('linksList');
    if (!links.length) { el.innerHTML = '<div class="empty-state">No links saved. Paste a URL above.</div>'; return; }
    el.innerHTML = links.map(l => `
      <div class="card">
        <div class="card-header">
          <div>
            <a href="${esc(l.url)}" target="_blank" rel="noopener" class="link-url">${esc(l.url)}</a>
            ${l.title ? `<div class="card-title" style="margin-top:4px">${esc(l.title)}</div>` : ''}
            <div class="card-meta">${timeAgo(l.created_at)}</div>
          </div>
          <div class="card-actions">
            <button class="btn-small" onclick="navigator.clipboard.writeText('${esc(l.url)}')">Copy</button>
            <button class="btn-small btn-danger" onclick="deleteLink(${l.id})">Delete</button>
          </div>
        </div>
        ${l.description ? `<div class="card-body">${esc(l.description)}</div>` : ''}
      </div>
    `).join('');
  }

  async function addLink() {
    const input = document.getElementById('linkInput');
    const url = input.value.trim();
    if (!url) return;
    await fetch(`${API}/links`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({url}) });
    input.value = '';
    loadLinks();
    loadSummary();
  }

  async function deleteLink(id) {
    if (!confirm('Delete this link?')) return;
    await fetch(`${API}/links/${id}`, { method: 'DELETE' });
    loadLinks();
    loadSummary();
  }

  // --- Deadlines ---
  async function loadDeadlines() {
    const res = await fetch(`${API}/deadlines`);
    const deadlines = await res.json();
    const el = document.getElementById('deadlinesList');
    if (!deadlines.length) { el.innerHTML = '<div class="empty-state">No deadlines set. Add one to start tracking.</div>'; return; }
    el.innerHTML = deadlines.map(d => {
      const isOverdue = d.status === 'active' && new Date(d.due_at) <= new Date();
      const badgeClass = d.status === 'finalized' ? 'badge-finalized' : isOverdue ? 'badge-overdue' : 'badge-active';
      const badgeText = d.status === 'finalized' ? 'Finalized' : isOverdue ? 'Overdue' : 'Active';
      return `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">${esc(d.title)} <span class="badge ${badgeClass}">${badgeText}</span></div>
              <div class="card-meta">Due: ${new Date(d.due_at).toLocaleString()}${d.auto_finalize ? ' · Auto-finalize' : ''}</div>
            </div>
            <div class="card-actions">
              ${d.status === 'active' ? `<button class="btn-small" onclick="finalizeDeadline(${d.id})">Finalize</button>` : ''}
              <button class="btn-small btn-danger" onclick="deleteDeadline(${d.id})">Delete</button>
            </div>
          </div>
          ${d.description ? `<div class="card-body">${esc(d.description)}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  function openDeadlineModal() {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('deadlineTitle').value = '';
    document.getElementById('deadlineDesc').value = '';
    document.getElementById('deadlineDate').value = tomorrow.toISOString().split('T')[0];
    document.getElementById('deadlineTime').value = '23:59';
    document.getElementById('deadlineAutoFinalize').checked = true;
    document.getElementById('deadlineModal').classList.add('active');
    document.getElementById('deadlineTitle').focus();
  }

  function closeDeadlineModal() {
    document.getElementById('deadlineModal').classList.remove('active');
  }

  async function saveDeadline() {
    const title = document.getElementById('deadlineTitle').value;
    const description = document.getElementById('deadlineDesc').value;
    const date = document.getElementById('deadlineDate').value;
    const time = document.getElementById('deadlineTime').value;
    const auto_finalize = document.getElementById('deadlineAutoFinalize').checked;
    if (!title || !date) return;
    const due_at = `${date}T${time || '23:59'}:00`;
    await fetch(`${API}/deadlines`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title, description, due_at, auto_finalize}) });
    closeDeadlineModal();
    loadDeadlines();
    loadSummary();
  }

  async function finalizeDeadline(id) {
    await fetch(`${API}/deadlines/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status: 'finalized'}) });
    loadDeadlines();
    loadSummary();
  }

  async function deleteDeadline(id) {
    if (!confirm('Delete this deadline?')) return;
    await fetch(`${API}/deadlines/${id}`, { method: 'DELETE' });
    loadDeadlines();
    loadSummary();
  }

  // --- Activity ---
  async function loadActivity() {
    const res = await fetch(`${API}/activity`);
    const items = await res.json();
    const el = document.getElementById('activityList');
    if (!items.length) { el.innerHTML = '<div class="empty-state">No activity yet. Start adding notes, links, or deadlines.</div>'; return; }
    el.innerHTML = items.map(a => `
      <div class="activity-item">
        <div>
          <div class="activity-action">${esc(a.action)} ${esc(a.entity_type)}</div>
          <div class="activity-summary">${esc(a.summary)}</div>
        </div>
        <div class="activity-time">${timeAgo(a.created_at)}</div>
      </div>
    `).join('');
  }

  // --- Utils ---
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr + 'Z').getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
  }

  // --- Init ---
  loadSummary();
  loadScratchpad();
</script>

</body>
</html>
